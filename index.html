<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="img/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container">

    <div class="sidebar">
        <img src="img/favicon.png" class="logo-side">

        <ul>
            <li onclick="ir('index.html')"><i class="fa fa-chart-line"></i> Dashboard</li>
            <li onclick="ir('html/equipe.html')"><i class="fa fa-users"></i> Equipe</li>
            <li><i class="fa fa-chart-pie"></i> Relatórios</li>
            <li><i class="fa fa-gear"></i> Configurações</li>
            <li onclick="logout()"><i class="fa fa-right-from-bracket"></i> Sair</li>
        </ul>

        <div class="user-box">
            <img src="img/favicon.png">
            <div>
                <p>Leonardo</p>
                <small>Gestor</small>
            </div>
        </div>
    </div>

    <div class="main">

        <div class="topbar">
            <input class="search" placeholder="Pesquisar...">
            <button class="btn"><i class="fa fa-plus"></i> Nova Tarefa</button>
        </div>

        <div class="cards">

            <div class="card blue">
                <i class="fa fa-list"></i>
                <h3>12</h3>
                <p>Em aberto</p>
            </div>

            <div class="card green">
                <i class="fa fa-check"></i>
                <h3>8</h3>
                <p>Concluídas</p>
            </div>

            <div class="card red">
                <i class="fa fa-exclamation"></i>
                <h3>3</h3>
                <p>Atrasadas</p>
            </div>

            <div class="card orange">
                <i class="fa fa-clock"></i>
                <h3>5</h3>
                <p>Pendentes</p>
            </div>

        </div>

        <div class="flex">

            <div class="table">
                <h3>Tarefas recentes</h3>

                <div class="task">
                    <p>Atualizar sistema</p>
                    <span>João • 20/04</span>
                </div>

                <div class="task">
                    <p>Criar relatório</p>
                    <span>Ana • 22/04</span>
                </div>

            </div>

            <div class="side-box">
                <h3>Resumo</h3>
                <div class="chart"></div>
            </div>

        </div>

    </div>

</div>

<script>
function ir(pagina) {
    window.location.href = pagina;
}
</script>

<script>
function logout() {
    localStorage.removeItem("logado"); // apaga sessão
    window.location.href = "html/login.html"; // volta pro login
}
</script>

</body>
</html>
